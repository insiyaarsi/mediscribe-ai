# =============================================================================
# MediScribe AI — Nginx configuration for the frontend container
# File location inside the container: /etc/nginx/conf.d/default.conf
# =============================================================================

server {
    listen 80;
    server_name _;

    # -------------------------------------------------------------------------
    # Serve the Vite build output
    #
    # Vite writes the production bundle to frontend/dist/.
    # The Docker build copies this to /usr/share/nginx/html inside the container.
    # -------------------------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # API proxy
    #
    # Any request starting with /api/ is forwarded to the backend container.
    # "backend" resolves via Docker's internal DNS — it matches the service name
    # in docker-compose.yml. Port 8000 is the Uvicorn port.
    #
    # Why proxy through Nginx instead of calling the backend directly?
    # - In development, the frontend calls localhost:8000 directly (Vite proxy).
    # - In a Docker setup without this proxy, the browser would need to know the
    #   backend's URL, which changes between environments (localhost vs Railway URL).
    # - Proxying through Nginx means the frontend always calls its own origin (/api/),
    #   and Nginx handles routing. This is the standard production pattern.
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Transcription uploads can be large audio files — increase timeouts
        # and body size limit to accommodate them.
        proxy_read_timeout    600s;
        proxy_connect_timeout 10s;
        client_max_body_size  50M;
    }

    # -------------------------------------------------------------------------
    # SPA fallback (React router)
    #
    # MediScribe uses Zustand-based client-side routing, not React Router's
    # URL-based routing. However this rule is correct practice for any SPA:
    # if Nginx cannot find a file matching the URL, serve index.html and let
    # the JS handle routing. Without this, a hard refresh on any non-root URL
    # returns a 404 from Nginx.
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Cache static assets
    #
    # Vite appends content hashes to JS/CSS filenames (e.g. main.a3f9c2.js).
    # These files are safe to cache for a long time because the filename changes
    # whenever the content changes. index.html itself should not be cached
    # aggressively because it references the hashed filenames.
    # -------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
